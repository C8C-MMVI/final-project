services:

  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: technologs_db
    environment:
      POSTGRES_DB: technologs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d technologs_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ← postgres/ init mount removed

  # ── Spring Boot (Inventory API) ──  ← NEW SERVICE
  springboot:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: technologs_spring
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/technologs_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "8081:8080"

  # ── PHP Application ──
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technologs_app
    depends_on:
      db:
        condition: service_healthy
      springboot:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: technologs_db
      DB_USER: postgres
      DB_PASSWORD: 1234
    volumes:
      - ./php:/var/www/html
    ports:
      - "8080:8000"
    command: php -S 0.0.0.0:8000 -t /var/www/html

  # ── React Frontend ──
  react:
    image: node:20          # ← remove -alpine
    container_name: technologs_react
    working_dir: /app
    shm_size: '256m'
    volumes:
      - ./react:/app
    ports:
      - "5173:5173"
    depends_on:
      - php
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data: