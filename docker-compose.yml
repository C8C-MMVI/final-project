version: '3.9'

services:

  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: technologs_db
    environment:
      POSTGRES_DB: technologs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d technologs_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Spring Boot (Inventory API) ──
  springboot:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: technologs_spring
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/technologs_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "8081:8080"

  # ── PHP Application ──
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technologs_app
    depends_on:
      db:
        condition: service_healthy
      springboot:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: technologs_db
      DB_USER: postgres
      DB_PASSWORD: 1234
      APP_URL: http://localhost:5173
      MAIL_FROM: hannahjoy.bagoyen@lorma.edu
      MAIL_FROM_NAME: TechnoLogs
      MAIL_USERNAME: hannahjoy.bagoyen@lorma.edu
      MAIL_PASSWORD: bluylonkyalisdjp
      MAIL_HOST: mailhog      # MailHog SMTP host
      MAIL_PORT: 1025         # MailHog SMTP port
    volumes:
      - ./php:/var/www/html
    ports:
      - "8080:8000"
    command: php -S 0.0.0.0:8000 -t /var/www/html

  # ── React Frontend ──
  react:
    image: node:20
    container_name: technologs_react
    working_dir: /app
    shm_size: '256m'
    volumes:
      - ./react:/app
    ports:
      - "5173:5173"
    depends_on:
      - php
    command: sh -c "npm install && npm run dev -- --host"

  # ── MailHog (for testing emails) ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: technologs_mailhog
    ports:
      - "1025:1025"  # SMTP port for PHP
      - "8025:8025"  # Web UI to view emails

volumes:
  postgres_data: