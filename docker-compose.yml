services:

  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: technologs_db
    env_file:
      - .env
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Spring Boot (Inventory API) ──  ← NEW SERVICE
  springboot:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: technologs_spring
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8081:8080"

  # ── PHP (Authentication) ──
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technologs_app
    depends_on:
      db:
        condition: service_healthy
      springboot:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: technologs_db
      DB_USER: postgres
      DB_PASSWORD: 1234
    volumes:
      - ./php:/var/www/html
    ports:
      - "8080:8000"
    command: php -S 0.0.0.0:8000 -t /var/www/html

    # ── Django (Analytics + POS) ──
  django:
    build:
      context: ./django_backend      # point to the folder with manage.py
      dockerfile: Dockerfile
    container_name: technologs_django
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./django_backend:/app       # map the folder with manage.py to /app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    environment:
    - DJANGO_SETTINGS_MODULE=technologs.settings
  # ── React Frontend ──
  react:
    image: node:20
    container_name: technologs_react
    working_dir: /app
    shm_size: '256m'
    volumes:
      - ./react:/app
    ports:
      - "5173:5173"
    depends_on:
      - php
    command: sh -c "npm install && npm run dev -- --host"

  # ── MailHog (for testing emails) ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: technologs_mailhog
    ports:
      - "1025:1025"  # SMTP port for PHP
      - "8025:8025"  # Web UI to view emails

volumes:
  postgres_data: