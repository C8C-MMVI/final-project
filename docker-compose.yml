services:

  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: technologs_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: "technologs_user"
      MONGO_INITDB_ROOT_PASSWORD: "Techn0L0gs@2025"

  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    container_name: technologs_db
    env_file:
      - .env
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Spring Boot ──
  springboot:
    build:
      context: ./springboot
      dockerfile: Dockerfile
    container_name: technologs_spring
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8081:8080"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: technologs_mongo
      MONGO_USER: technologs_user
      MONGO_PASSWORD: "Techn0L0gs@2025"
      SPRING_DATA_MONGODB_URI: mongodb://technologs_user:Techn0L0gs%402025@mongo:27017/technologs_mongo?authSource=admin
      APP_PHP_BASE_URL: http://php:8000
      APP_SERVICE_KEY: tEcHn0L0gs-Chat-2025-xK9mPqR

  # ── Django ──
  django:
    build:
      context: ./django_backend
      dockerfile: Dockerfile
    container_name: technologs_django
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./django_backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: technologs.settings
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: technologs_mongo
      MONGO_USER: technologs_user
      MONGO_PASSWORD: "Techn0L0gs@2025"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PHP ──
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technologs_app
    depends_on:
      db:
        condition: service_healthy
      springboot:
        condition: service_started
      django:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: technologs_db
      DB_USER: postgres
      DB_PASSWORD: 1234
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: technologs_mongo
      MONGO_USER: technologs_user
      MONGO_PASSWORD: "Techn0L0gs@2025"
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: hannahjoy.bagoyen@lorma.edu
      MAIL_PASSWORD: wqrfpvmjftaunfcr
      MAIL_FROM: hannahjoy.bagoyen@lorma.edu
      MAIL_FROM_NAME: TechnoLogs
      APP_URL: http://localhost:3000
      APP_SERVICE_KEY: tEcHn0L0gs-Chat-2025-xK9mPqR
    volumes:
      - ./php:/var/www/html
      - uploads_data:/var/www/html/uploads
    ports:
      - "8080:8000"
    command: php -S 0.0.0.0:8000 -t /var/www/html /var/www/html/router.php

  # ── Gateway ──
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: technologs_gateway
    ports:
      - "9090:9090"
    depends_on:
      - php
      - django
      - springboot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React ──
  react:
    image: node:20
    container_name: technologs_react
    working_dir: /app
    shm_size: '256m'
    volumes:
      - ./react:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    depends_on:
      - gateway
    environment:
      - VITE_GOOGLE_CLIENT_ID=1073352016763-jn24hcdbgcioiidgji6ls93fhrk27akq.apps.googleusercontent.com
      - VITE_API_BASE=http://localhost:9090
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  # ── MailHog ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: technologs_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  mongo_data:
  uploads_data: