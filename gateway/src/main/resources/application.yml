server:
  port: 9090

spring:
  application:
    name: technologs-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Allow any origin during development so any device on the
            # same WiFi (phone, tablet, another laptop) can connect
            # without having to hardcode every possible LAN IP.
            # ─────────────────────────────────────────────────────────
            # IMPORTANT: allowCredentials: true is INCOMPATIBLE with
            # allowedOrigins: "*" in Spring — so we use
            # allowedOriginPatterns instead, which supports wildcards
            # WITH credentials.
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "http://192.168.*.*:*"    # any LAN device on 192.168.x.x
              - "http://10.*.*.*:*"       # common Docker / VPN subnet
              - "http://172.*.*.*:*"      # Docker bridge default subnet
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
              - "Authorization"
              - "Content-Type"
            exposedHeaders:
              - "Authorization"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # ── Spring Boot Backend ──────────────────────────────────────────────
        - id: springboot-sales-route
          uri: http://springboot:8080
          predicates:
            - Path=/api/sales/**
          filters:
            - StripPrefix=0

        - id: springboot-events-route
          uri: http://springboot:8080
          predicates:
            - Path=/api/events/**
          filters:
            - StripPrefix=0

        - id: springboot-chat-route
          uri: http://springboot:8080
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=0

        - id: springboot-ws-route
          uri: http://springboot:8080
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0

        # ── PHP Backend ──────────────────────────────────────────────────────
        # Catch-all for /api/** — must stay LAST among /api routes
        - id: php-route
          uri: http://php:8000
          predicates:
            - Path=/api/**

        # ── Images (served by PHP) ───────────────────────────────────────────
        - id: images-route
          uri: http://php:8000
          predicates:
            - Path=/images/**

        # ── Uploads (avatars, user-uploaded files served by PHP) ─────────────
        - id: uploads-route
          uri: http://php:8000
          predicates:
            - Path=/uploads/**

        # ── Django Backend ───────────────────────────────────────────────────
        - id: django-route
          uri: http://django:8000
          predicates:
            - Path=/django/**
          filters:
            - StripPrefix=1
            - PreserveHostHeader

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always