spring.application.name=technologs

# ── PostgreSQL ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://db:5432/technologs_db
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.repair-on-migrate=true

# ── MongoDB ─────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://technologs_user:Techn0L0gs%402025@mongo:27017/technologs_mongo?authSource=admin
spring.data.mongodb.auto-index-creation=true

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

